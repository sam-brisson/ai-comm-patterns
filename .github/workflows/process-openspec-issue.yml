name: Process OpenSpec from Slack Conversation

on:
  issues:
    types: [labeled]
  repository_dispatch:
    types: [slack-transcript]

jobs:
  process-openspec:
    # Run if: issue labeled with propose/explore OR repository_dispatch event
    if: |
      (github.event_name == 'issues' && (contains(github.event.issue.labels.*.name, 'propose') || contains(github.event.issue.labels.*.name, 'explore'))) ||
      github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install @anthropic-ai/sdk

      - name: Determine mode and parse content
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let mode, conversation, title, issueNumber;

            if (context.eventName === 'repository_dispatch') {
              // Slack webhook payload
              const payload = context.payload.client_payload;
              mode = payload.mode || 'propose';
              conversation = payload.transcript || payload.message || '';
              title = payload.title || 'Slack Huddle Transcript';
              issueNumber = null; // Will create issue

              console.log('Source: repository_dispatch (Slack webhook)');
              console.log('Mode:', mode);
              console.log('Transcript length:', conversation.length);

              if (!conversation) {
                core.setFailed('No transcript provided in webhook payload');
                return;
              }

              // Create a GitHub issue to track this
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: `## Slack Transcript\n\n${conversation}\n\n---\n*Submitted via Slack webhook*`,
                labels: [mode]
              });

              issueNumber = issue.data.number;
              console.log('Created issue:', issueNumber);

            } else {
              // Issue labeled event
              const issue = context.payload.issue;
              const labels = issue.labels.map(l => l.name);
              mode = labels.includes('propose') ? 'propose' : 'explore';
              conversation = (issue.body || '').trim();
              title = issue.title || '';
              issueNumber = issue.number;

              console.log('Source: issue labeled');
              console.log('Mode:', mode);
              console.log('Issue:', issueNumber);
              console.log('Conversation length:', conversation.length);

              if (!conversation) {
                core.setFailed('Issue body is empty - no conversation to process');
                return;
              }
            }

            // Write conversation to file to avoid shell escaping issues
            fs.writeFileSync('conversation.txt', conversation);
            fs.writeFileSync('title.txt', title);
            console.log('Wrote conversation.txt (' + conversation.length + ' chars)');

            core.setOutput('mode', mode);
            core.setOutput('issueNumber', issueNumber);

      - name: Gather Existing Changes
        run: |
          # Scan all existing changes and create summaries
          node .github/scripts/gather-openspec-context.js > changes-context.json
          echo "Generated changes context:"
          cat changes-context.json

      - name: Process with Claude API
        id: process
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node .github/scripts/process-openspec-conversation.js \
            --mode "${{ steps.parse.outputs.mode }}" \
            --conversation-file "conversation.txt" \
            --title-file "title.txt" \
            --changes-context-file "changes-context.json" \
            --issue-number "${{ steps.parse.outputs.issueNumber }}"

      - name: Create Branch and Commit (Propose Mode)
        id: commit
        if: steps.parse.outputs.mode == 'propose'
        run: |
          BRANCH_NAME="openspec-from-issue-${{ steps.parse.outputs.issueNumber }}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Fetch remote branches to check if branch exists
          git fetch origin

          # Check if branch exists remotely and delete it if so
          if git ls-remote --exit-code --heads origin $BRANCH_NAME; then
            echo "Branch $BRANCH_NAME exists remotely, deleting it first..."
            git push origin --delete $BRANCH_NAME
          fi

          git checkout -b $BRANCH_NAME
          git add openspec/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "OpenSpec updates from issue #${{ steps.parse.outputs.issueNumber }}"
            git push origin $BRANCH_NAME
            echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request (Propose Mode)
        if: steps.parse.outputs.mode == 'propose' && steps.commit.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issueNumber = ${{ steps.parse.outputs.issueNumber }};
            const branch = '${{ steps.commit.outputs.branch }}';

            // Read the PR description generated by Claude
            let prBody = '';
            try {
              prBody = fs.readFileSync('pr-description.md', 'utf8');
            } catch (e) {
              prBody = `## OpenSpec Updates from Slack Conversation\n\nThis PR was generated from Issue #${issueNumber}.\n\nReview the changes and merge when ready.`;
            }

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `OpenSpec updates from Issue #${issueNumber}`,
              head: branch,
              base: 'main',
              body: prBody
            });

            // Comment on original issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `Pull Request created: #${pr.data.number}\n\nReview the proposed OpenSpec changes and merge when ready.`
            });

            // Add pending-review label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['pending-review']
            });

      - name: Post Explore Analysis (Explore Mode)
        if: steps.parse.outputs.mode == 'explore'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issueNumber = ${{ steps.parse.outputs.issueNumber }};

            // Read the analysis generated by Claude
            let analysis = '';
            try {
              analysis = fs.readFileSync('explore-analysis.md', 'utf8');
            } catch (e) {
              analysis = 'Analysis could not be generated. Please check the workflow logs.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: analysis
            });

            // Add explored label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['explored']
            });
