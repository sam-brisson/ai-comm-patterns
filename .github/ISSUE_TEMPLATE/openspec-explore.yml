name: OpenSpec - Explore
description: Submit a conversation transcript for exploration and analysis - refines existing changes or identifies new initiatives
title: "[EXPLORE]: "
labels: ["explore"]
body:
  - type: markdown
    attributes:
      value: |
        ## Explore Mode
        Use this template to analyze conversations and update OpenSpec artifacts. Explore mode is ideal for:
        - Refining existing proposals based on team discussions
        - Capturing key decisions and open questions
        - Iterating on designs before implementation

  - type: input
    id: title
    attributes:
      label: Conversation Title
      description: A brief title describing what this conversation is about
      placeholder: "e.g., Huddle on booking form validation"
    validations:
      required: true

  - type: textarea
    id: transcript
    attributes:
      label: Conversation Transcript
      description: Paste the complete conversation or huddle transcript here
      placeholder: |
        Paste your Slack huddle transcript, meeting notes, or team conversation here.

        Example:
        Sam: I think we need to revisit the form validation approach...
        Brian: Good point. What if we disable the submit button until...
        [entire conversation]
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context (optional)
      description: Any context that would help with analysis
      placeholder: |
        e.g., "This relates to the tdd-knowledge-page change"
        "Focus on the decisions about the booking form"
